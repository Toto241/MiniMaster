// Top-level build file where you can add configuration options common to all sub-projects/modules.
buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.12.0' // Version from a typical modern project
        classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.8.20' // Match childApp's kotlin version
        classpath 'com.google.dagger:hilt-android-gradle-plugin:2.48' // Match childApp's hilt version
        classpath 'com.google.gms:google-services:4.3.15' // Google services plugin
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
