// Top-level build file where you can add configuration options common to all sub-projects/modules.
buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:7.4.2' // Version from a typical modern project
        classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.8.20' // Match childApp's kotlin version
        classpath 'com.google.dagger:hilt-android-gradle-plugin:2.48' // Match childApp's hilt version
        classpath 'com.google.gms:google-services:4.3.15' // Google services plugin
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}

allprojects {
    configurations.all {
        resolutionStrategy {
            // Force specific versions of transitive dependencies to mitigate CVEs
            // Ref: Technical Audit Report, Table 4.1

            // CVE-2021-44228 ("Log4Shell")
            force 'org.apache.logging.log4j:log4j-api:2.17.1'
            force 'org.apache.logging.log4j:log4j-core:2.17.1'

            // CVE-2022-42003
            force 'com.fasterxml.jackson.core:jackson-databind:2.13.4.2'

            // CVE-2022-42889 ("Text4Shell")
            force 'org.apache.commons:commons-text:1.10.0'

            // CVE-2022-31197
            force 'org.postgresql:postgresql:42.3.6'

            // CVE-2023-20863 (Unlikely in Android, but forced for safety)
            force 'org.springframework:spring-core:5.3.25' // A common transitive dep from spring-boot
        }
    }
}
