<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniMaster Operator Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-functions-compat.js"></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>MiniMaster Operator Dashboard</h1>
            <div id="auth-status" class="auth-status">
                <span id="user-email"></span>
                <button id="logout-btn" onclick="logout()" style="display: none;">Logout</button>
            </div>
        </header>

        <main class="main-content">
            <!-- Login Section -->
            <section id="login-section" class="section">
                <h2>Operator Login</h2>
                <form id="login-form">
                    <input type="email" id="login-email" placeholder="Email" required>
                    <input type="password" id="login-password" placeholder="Password" required>
                    <button type="submit" class="btn btn-primary">Login</button>
                </form>
            </section>

            <!-- Dashboard Section (Hidden until authorized) -->
            <section id="dashboard-section" class="section" style="display: none;">
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Total Users</h3>
                        <p id="stat-total-users">--</p>
                    </div>
                    <div class="stat-card">
                        <h3>Active Subscriptions</h3>
                        <p id="stat-active-subs">--</p>
                    </div>
                    <div class="stat-card">
                        <h3>Total Tasks Assigned</h3>
                        <p id="stat-total-tasks">--</p>
                    </div>
                </div>

                <h2>User Management</h2>
                <div class="user-search">
                    <input type="text" id="user-search-input" placeholder="Search by Email or Child ID">
                    <button onclick="searchUsers()" class="btn btn-secondary">Search</button>
                </div>
                <div id="user-list" class="data-list">
                    <!-- User data will be rendered here -->
                </div>

                <h2>Subscription Monitoring</h2>
                <div id="subscription-list" class="data-list">
                    <!-- Subscription data will be rendered here -->
                </div>

                <h2>Support Tickets</h2>
                <div class="support-filters">
                    <button onclick="filterTickets('all')" class="btn btn-secondary">All</button>
                    <button onclick="filterTickets('open')" class="btn btn-secondary">Open</button>
                    <button onclick="filterTickets('in_progress')" class="btn btn-secondary">In Progress</button>
                    <button onclick="filterTickets('closed')" class="btn btn-secondary">Closed</button>
                </div>
                <div id="support-tickets-list" class="data-list">
                    <!-- Support tickets will be rendered here -->
                </div>

                <h2>Audit Logs</h2>
                <div class="filters">
                    <select id="auditActionFilter">
                        <option value="">All Actions</option>
                        <option value="device.locked">Device Locked</option>
                        <option value="device.unlocked">Device Unlocked</option>
                        <option value="device.paired">Device Paired</option>
                        <option value="device.registered">Device Registered</option>
                        <option value="task.created">Task Created</option>
                        <option value="task.completed">Task Completed</option>
                        <option value="task.approved">Task Approved</option>
                        <option value="task.rejected">Task Rejected</option>
                        <option value="rules.usage_updated">Usage Rules Updated</option>
                        <option value="admin.claim_set">Admin Claim Set</option>
                        <option value="admin.subscription_revoked">Subscription Revoked</option>
                        <option value="auth.login_failure">Login Failures</option>
                        <option value="auth.token_generated">Token Generated</option>
                    </select>
                    
                    <select id="auditUserRoleFilter">
                        <option value="">All Roles</option>
                        <option value="master">Master</option>
                        <option value="child">Child</option>
                        <option value="admin">Admin</option>
                    </select>
                    
                    <select id="auditStatusFilter">
                        <option value="">All Status</option>
                        <option value="success">Success</option>
                        <option value="failure">Failure</option>
                    </select>
                    
                    <input type="date" id="auditDateFrom" placeholder="From Date">
                    <input type="date" id="auditDateTo" placeholder="To Date">
                    
                    <button onclick="loadAuditLogs()" class="btn btn-primary">Filter</button>
                    <button onclick="exportAuditLogs()" class="btn btn-secondary">Export CSV</button>
                </div>
                <div id="audit-log-list" class="audit-log-container">
                    <!-- Populated by JavaScript -->
                </div>
            </section>
        </main>

        <div id="notification" class="notification" style="display: none;"></div>
    </div>

    <!-- User Details Modal -->
    <div id="user-details-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close" onclick="closeUserDetailsModal()">&times;</span>
            <div id="user-details-content">
                <!-- User details will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Audit Details Modal -->
    <div id="audit-details-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close" onclick="closeAuditDetailsModal()">&times;</span>
            <div id="audit-details-content">
                <!-- Audit details will be loaded here -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
