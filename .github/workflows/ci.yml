name: CI
on:
  push:
    paths:
      - '**/*.ts'
      - '**/*.kt'
      - '**/*.xml'
      - '**/*.html'
      - 'admin-panel/**'
      - 'web-control/**'
      - 'parent-panel/**'
      - 'child-panel/**'
      - '**/build.gradle'
      - '**/build.gradle.kts'
      - 'settings.gradle'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - 'package.json'
      - 'yarn.lock'
      - 'package-lock.json'
      - 'jest.config.*'
      - 'tsconfig.json'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - '**/*.ts'
      - '**/*.kt'
      - '**/*.xml'
      - '**/*.html'
      - 'admin-panel/**'
      - 'web-control/**'
      - 'parent-panel/**'
      - 'child-panel/**'
      - '**/build.gradle'
      - '**/build.gradle.kts'
      - 'settings.gradle'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - 'package.json'
      - 'yarn.lock'
      - 'package-lock.json'
      - 'jest.config.*'
      - 'tsconfig.json'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

jobs:
  functions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Secret leak guard
        run: npm run guard:secrets

      - name: Run linting
        run: npm run lint

      - name: Run backend tests
        run: npm run test:ci -- --silent

      - name: Upload backend test and coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-quality-gate
          path: |
            coverage/
          retention-days: 30

  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        # Set working directory to repository root where Gradle files are located
        working-directory: .
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Prepare Firebase placeholder configs
        run: |
          cat > masterApp/google-services.json <<'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "placeholder-ci",
              "storage_bucket": "placeholder-ci.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:placeholdermaster",
                  "android_client_info": {
                    "package_name": "com.minimaster.masterapp"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "placeholder"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF
          cat > childApp/google-services.json <<'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "placeholder-ci",
              "storage_bucket": "placeholder-ci.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:placeholderchild",
                  "android_client_info": {
                    "package_name": "com.minimaster.childapp"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "placeholder"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: Show Gradle version
        run: ./scripts/run-android-checks.sh --version

      - name: Validate Android manifests
        run: |
          echo "Validating Android manifest files..."
          # Check for common XML syntax issues
          for manifest in masterApp/src/main/AndroidManifest.xml childApp/src/main/AndroidManifest.xml; do
            if [ -f "$manifest" ]; then
              echo "Checking $manifest..."
              # Check for JavaScript-style comments in XML
              if grep -q "{/\*\|/\*}" "$manifest"; then
                echo "ERROR: Found JavaScript-style comments in $manifest"
                grep -n "{/\*\|/\*}" "$manifest"
                exit 1
              fi
              echo "✓ $manifest syntax appears valid"
            fi
          done

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Show Gradle version
        run: ./scripts/run-android-checks.sh --version

      - name: Test network access to Google Maven
        id: network-test
        run: |
          if curl -f --connect-timeout 10 https://dl.google.com/dl/android/maven2/ > /dev/null 2>&1; then
            echo "google-maven-accessible=true" >> $GITHUB_OUTPUT
            echo "✓ Google Maven repository is accessible"
          else
            echo "google-maven-accessible=false" >> $GITHUB_OUTPUT
            echo "::warning::Google Maven repository (dl.google.com) is not accessible from this environment. Skipping Android build."
          fi

      - name: Build (fail on deprecations in CI)
        if: steps.network-test.outputs.google-maven-accessible == 'true'
        run: ./scripts/run-android-checks.sh clean build -Dorg.gradle.warning.mode=all --continue --no-daemon

      - name: Run Android unit tests
        if: steps.network-test.outputs.google-maven-accessible == 'true'
        run: ./scripts/run-android-checks.sh testDebugUnitTest --continue --no-daemon

      - name: Detekt
        if: steps.network-test.outputs.google-maven-accessible == 'true'
        run: ./scripts/run-android-checks.sh detektAll --continue --no-daemon

      - name: Check Kotlin code style
        if: steps.network-test.outputs.google-maven-accessible == 'true'
        run: ./scripts/run-android-checks.sh ktlintCheck --continue --no-daemon

      - name: Build debug APKs
        if: steps.network-test.outputs.google-maven-accessible == 'true'
        run: ./scripts/run-android-checks.sh assembleDebug --continue --no-daemon

      - name: Generate Jacoco report
        if: steps.network-test.outputs.google-maven-accessible == 'true'
        run: |
          if ./scripts/run-android-checks.sh tasks --all --no-daemon | grep -qE '(^|[[:space:]])jacocoTestReport([[:space:]]|$)'; then
            ./scripts/run-android-checks.sh jacocoTestReport --continue --no-daemon
          else
            echo "::notice::No jacocoTestReport task is configured; skipping Android coverage report."
          fi

      - name: Upload reports
        if: steps.network-test.outputs.google-maven-accessible == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: android-reports
          path: |
            **/build/reports/**
            **/build/jacoco/**

  android-instrumentation:
    runs-on: ubuntu-latest
    needs: android
    timeout-minutes: 60
    if: needs.android.result == 'success'
    defaults:
      run:
        # Set working directory to repository root where Gradle files are located
        working-directory: .
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: android-actions/setup-android@v4
      - name: Prepare Firebase placeholder configs
        run: |
          cat > masterApp/google-services.json <<'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "placeholder-ci",
              "storage_bucket": "placeholder-ci.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:placeholdermaster",
                  "android_client_info": {
                    "package_name": "com.minimaster.masterapp"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "placeholder"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF
          cat > childApp/google-services.json <<'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "placeholder-ci",
              "storage_bucket": "placeholder-ci.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:placeholderchild",
                  "android_client_info": {
                    "package_name": "com.minimaster.childapp"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "placeholder"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF
      - uses: gradle/actions/setup-gradle@v6
      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Test network access to Google Maven
        id: network-test
        run: |
          if curl -f --connect-timeout 10 https://dl.google.com/dl/android/maven2/ > /dev/null 2>&1; then
            echo "google-maven-accessible=true" >> $GITHUB_OUTPUT
          else
            echo "google-maven-accessible=false" >> $GITHUB_OUTPUT
            echo "::warning::Google Maven repository (dl.google.com) is not accessible from this environment. Skipping instrumentation."
          fi
      - name: Start AVD
        if: steps.network-test.outputs.google-maven-accessible == 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          target: google_apis
          profile: pixel_6
          script: ./scripts/run-android-checks.sh connectedDebugAndroidTest --continue --no-daemon
      - name: Upload androidTest reports
        if: steps.network-test.outputs.google-maven-accessible == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: android-instrumentation-reports
          path: '**/build/reports/androidTests/**'
