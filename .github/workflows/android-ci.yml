name: Android CI
on:
  push:
    paths: ['**/*.kt', '**/build.gradle', 'settings.gradle', 'gradle/**', '.github/workflows/android-ci.yml']
  pull_request:
    paths: ['**/*.kt', '**/build.gradle', 'settings.gradle', 'gradle/**', '.github/workflows/android-ci.yml']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        # Set working directory to repository root where Gradle files are located
        working-directory: .
    steps:
      - uses: actions/checkout@v6
      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Check network access to Google Maven
        id: network-check
        run: |
          if curl -sSf --max-time 15 https://dl.google.com >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "✅ Google Maven repository is accessible"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Google Maven repository (dl.google.com) is not accessible from this environment. Skipping Android build."
          fi
      - name: Set up Android SDK
        if: steps.network-check.outputs.available == 'true'
        uses: android-actions/setup-android@v4
      - name: Set up Gradle
        if: steps.network-check.outputs.available == 'true'
        uses: gradle/actions/setup-gradle@v6
      - name: Show Gradle version
        if: steps.network-check.outputs.available == 'true'
        run: ./scripts/run-android-checks.sh --version
      - name: Prepare Firebase placeholder configs
        if: steps.network-check.outputs.available == 'true'
        run: ./scripts/ci/write-placeholder-google-services.sh
      - name: Build & Unit tests
        if: steps.network-check.outputs.available == 'true'
        run: ./scripts/run-android-checks.sh clean testDebugUnitTest :masterApp:assembleDebug :childApp:assembleDebug
      - name: Lint
        if: steps.network-check.outputs.available == 'true'
        run: ./scripts/run-android-checks.sh lint
      - name: Verify combinatorial test matrix coverage
        if: steps.network-check.outputs.available == 'true'
        run: python3 scripts/combinatorial_matrix.py --selftest
      - name: Generate combinatorial matrix artifact
        if: steps.network-check.outputs.available == 'true'
        run: python3 scripts/combinatorial_matrix.py --json-out build/test-automation/combinatorial-matrix.json
      - name: Jacoco report
        if: steps.network-check.outputs.available == 'true'
        run: |
          if ./scripts/run-android-checks.sh tasks --all --no-daemon | grep -qE '(^|[[:space:]])jacocoTestReport([[:space:]]|$)'; then
            ./scripts/run-android-checks.sh jacocoTestReport
          else
            echo "::notice::No jacocoTestReport task is configured; skipping Android coverage report."
          fi
      - name: Upload reports
        if: steps.network-check.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: android-reports
          path: |
            **/build/reports/**
            **/build/jacoco/**

  # Instrumented Tests auf einer Android-Versions-Matrix. Ersetzt den frueheren
  # Placeholder-Schritt. Die API-Level spiegeln das "minimal"-Execution-Profil
  # (qa/catalog/execution-profiles.json: Android 10/14/16 -> API 29/34/36), damit
  # versionsabhaengige Features (DeviceAdmin, Overlay, Notification-Permission)
  # tatsaechlich auf mehreren Android-Versionen laufen.
  instrumentation-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # On-demand (workflow_dispatch), NICHT bei jedem PR/Push. Die Instrumented-
    # Test-Quellen kompilieren und der Emulator bootet jetzt, aber die Tests
    # selbst haben akkumulierte Laufzeit-Rot (UI-Assertions "component is not
    # displayed", veraltete Erwartungswerte) aus der Zeit, als sie in keiner CI
    # liefen. Bis diese Suite repariert ist, waere ein automatischer Lauf bei
    # jedem PR ~26 min Emulator-CI ohne verwertbares Signal. Manuell ueber den
    # Actions-Tab startbar zum schrittweisen Sanieren.
    if: github.event_name == 'workflow_dispatch'
    # Advisory, solange die Suite nicht stabil gruen ist; dann entfernen.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        api-level: [29, 34]
        target: [google_apis]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Check network access to Google Maven
        id: network-check
        run: |
          if curl -sSf --max-time 15 https://dl.google.com >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Google Maven not reachable; skipping instrumentation matrix."
          fi
      - name: Set up Android SDK
        if: steps.network-check.outputs.available == 'true'
        uses: android-actions/setup-android@v4
      - name: Set up Gradle
        if: steps.network-check.outputs.available == 'true'
        uses: gradle/actions/setup-gradle@v6
      - name: Prepare Firebase placeholder configs
        if: steps.network-check.outputs.available == 'true'
        run: ./scripts/ci/write-placeholder-google-services.sh
      - name: Free up disk space for emulator
        if: steps.network-check.outputs.available == 'true'
        # Der Emulator braucht ~7,4 GB fuer die userdata-Partition; der Runner
        # hat das ohne Aufraeumen nicht frei (FATAL: Not enough space). Hier
        # nicht benoetigte Toolchains entfernen (Android-SDK bleibt erhalten).
        run: |
          echo "Vorher:"; df -h /home/runner | tail -1
          # /opt/hostedtoolcache NICHT loeschen – dort liegt das von setup-java
          # bereitgestellte JDK 17 (JAVA_HOME), das der Gradle-Build braucht.
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost \
            /usr/share/swift /opt/hostedtoolcache/CodeQL \
            /usr/local/lib/android/sdk/ndk || true
          sudo docker image prune --all --force >/dev/null 2>&1 || true
          echo "Nachher:"; df -h /home/runner | tail -1
      - name: Enable KVM hardware acceleration
        if: steps.network-check.outputs.available == 'true'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run instrumented tests on API ${{ matrix.api-level }}
        if: steps.network-check.outputs.available == 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./scripts/run-android-checks.sh :childApp:connectedDebugAndroidTest :masterApp:connectedDebugAndroidTest --continue --no-daemon
      - name: Upload instrumentation reports
        if: always() && steps.network-check.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: instrumentation-reports-api${{ matrix.api-level }}
          path: |
            **/build/reports/androidTests/**
            **/build/outputs/androidTest-results/**
