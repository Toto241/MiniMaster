name: Android CI
on:
  push:
    paths: ['**/*.kt', '**/build.gradle', 'settings.gradle', 'gradle/**', '.github/workflows/android-ci.yml']
  pull_request:
    paths: ['**/*.kt', '**/build.gradle', 'settings.gradle', 'gradle/**', '.github/workflows/android-ci.yml']

permissions:
  contents: read

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        # Set working directory to repository root where Gradle files are located
        working-directory: .
    steps:
      - uses: actions/checkout@v6
      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Check network access to Google Maven
        id: network-check
        run: |
          if curl -sSf --max-time 15 https://dl.google.com >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "✅ Google Maven repository is accessible"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Google Maven repository (dl.google.com) is not accessible from this environment. Skipping Android build."
          fi
      - name: Set up Android SDK
        if: steps.network-check.outputs.available == 'true'
        uses: android-actions/setup-android@v4
      - name: Set up Gradle
        if: steps.network-check.outputs.available == 'true'
        uses: gradle/actions/setup-gradle@v6
      - name: Show Gradle version
        if: steps.network-check.outputs.available == 'true'
        run: ./scripts/run-android-checks.sh --version
      - name: Prepare Firebase placeholder configs
        if: steps.network-check.outputs.available == 'true'
        run: |
          cat > masterApp/google-services.json <<'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "placeholder-ci",
              "storage_bucket": "placeholder-ci.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:placeholdermaster",
                  "android_client_info": {
                    "package_name": "com.minimaster.masterapp"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "placeholder"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF
          cat > childApp/google-services.json <<'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "placeholder-ci",
              "storage_bucket": "placeholder-ci.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:placeholderchild",
                  "android_client_info": {
                    "package_name": "com.google.pairing"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "placeholder"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF
      - name: Build & Unit tests
        if: steps.network-check.outputs.available == 'true'
        run: ./scripts/run-android-checks.sh clean testDebugUnitTest :masterApp:assembleDebug :childApp:assembleDebug
      - name: Lint
        if: steps.network-check.outputs.available == 'true'
        run: ./scripts/run-android-checks.sh lint
      - name: Android test (instrumentation)
        if: steps.network-check.outputs.available == 'true'
        run: echo "Instrumentation tests are typically run on emulator; configure matrix if needed."
      - name: Jacoco report
        if: steps.network-check.outputs.available == 'true'
        run: ./scripts/run-android-checks.sh jacocoTestReport
      - name: Upload reports
        if: steps.network-check.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: android-reports
          path: |
            **/build/reports/**
            **/build/jacoco/**
