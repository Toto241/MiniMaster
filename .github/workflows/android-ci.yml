name: Android CI
on:
  push:
    paths: ['**/*.kt', '**/build.gradle', 'settings.gradle', 'gradle/**']
  pull_request:
    paths: ['**/*.kt', '**/build.gradle', 'settings.gradle', 'gradle/**']

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        # Set working directory to repository root where Gradle files are located
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Gradle cache
        uses: gradle/gradle-build-action@v3
      - name: Show Gradle version
        run: ./scripts/run-android-checks.sh --version
      - name: Build & Unit tests
        run: ./scripts/run-android-checks.sh clean testDebugUnitTest :masterApp:assembleDebug :childApp:assembleDebug
      - name: Lint
        run: ./scripts/run-android-checks.sh lint
      - name: Android test (instrumentation)
        run: echo "Instrumentation tests are typically run on emulator; configure matrix if needed."
      - name: Jacoco report
        run: ./scripts/run-android-checks.sh jacocoTestReport || echo "Jacoco not configured, skipping coverage"
      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: android-reports
          path: |
            **/build/reports/**
            **/build/jacoco/**
