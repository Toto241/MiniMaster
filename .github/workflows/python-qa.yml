name: Python QA

on:
  push:
    paths:
      - 'scripts/**'
      - 'python_admin/**'
      - 'qa/**'
      - '.github/workflows/python-qa.yml'
  pull_request:
    paths:
      - 'scripts/**'
      - 'python_admin/**'
      - 'qa/**'
      - '.github/workflows/python-qa.yml'

permissions:
  contents: read

jobs:
  python-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test dependencies
        # Die getestete Codebasis (scripts/, python_admin/) nutzt ausschliesslich
        # die Standardbibliothek; die Tests selbst brauchen nur pytest.
        run: python -m pip install --upgrade pip pytest

      - name: Verify combinatorial matrix coverage
        working-directory: scripts
        run: python combinatorial_matrix.py --selftest

      - name: Run Python test suite
        working-directory: scripts
        # Deselektierte Tests (jeweils ein eigener, dokumentierter Folge-Task):
        #   1-2) android-automation-sweep / full-master-commissioning erwarten ein
        #        real provisioniertes Android-SDK + AVD-Manager und schlagen ohne
        #        diese Umgebung deterministisch im Precheck fehl (HTTP 400 statt
        #        Erreichen des gemockten Freigabe-Gates). TODO: SDK/AVD-Precheck
        #        in den Tests mocken oder Job mit setup-android provisionieren.
        #   3-4) Die beiden testing-register-Insight-Tests rufen das echte
        #        build_testing_register() auf und teilen sich Modul-Globalstate;
        #        bei gemeinsamem Lauf beeinflussen sie sich gegenseitig (flaky).
        #        TODO: build_testing_register() in diesen Tests mocken oder den
        #        geteilten State isolieren.
        run: |
          python -m pytest -q \
            --deselect "tests/test_app_suites.py::TestMiniMasterAdminHandlerRoutes::test_do_post_android_automation_sweep_rejects_warning_state_without_active_approval" \
            --deselect "tests/test_integration.py::TestFullUsbTestFlow::test_full_master_commissioning_flow" \
            --deselect "tests/test_http_runtime_qa.py::TestQaRuntimeHttpContracts::test_runtime_http_serves_duplicate_coverage_insights_in_testing_register" \
            --deselect "tests/test_http_runtime_qa.py::TestQaRuntimeHttpContracts::test_runtime_http_serves_manual_prioritization_insights_in_testing_register"
