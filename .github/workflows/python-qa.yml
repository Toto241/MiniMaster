name: Python QA

on:
  push:
    paths:
      - 'scripts/**'
      - 'python_admin/**'
      - 'qa/**'
      - '.github/workflows/python-qa.yml'
  pull_request:
    paths:
      - 'scripts/**'
      - 'python_admin/**'
      - 'qa/**'
      - '.github/workflows/python-qa.yml'

permissions:
  contents: read

jobs:
  python-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test dependencies
        # Die getestete Codebasis (scripts/, python_admin/) nutzt ausschliesslich
        # die Standardbibliothek; die Tests selbst brauchen nur pytest.
        run: python -m pip install --upgrade pip pytest

      - name: Verify combinatorial matrix coverage
        working-directory: scripts
        run: python combinatorial_matrix.py --selftest

      - name: Run Python test suite
        working-directory: scripts
        run: python -m pytest -q
