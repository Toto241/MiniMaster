name: CodeQL Security Analysis

on:
  push:
    branches: [ main ]
    paths:
      - '**/*.ts'
      - '**/*.js'
      - '**/*.kt'
      - '**/*.java'
      - '.github/workflows/codeql-analysis.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '**/*.ts'
      - '**/*.js'
      - '**/*.kt'
      - '**/*.java'
  schedule:
    # Weekly scan on Monday at 2 AM UTC
    - cron: '0 2 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze Code (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 360

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript
            build-mode: none
          - language: java
            build-mode: manual

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # Initializes the CodeQL tools for scanning
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # Custom query pack for extra security checks
          queries: security-and-quality,./codeql-custom-queries-actions

      - name: Set up Java 17
        if: ${{ matrix.language == 'java' }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        if: ${{ matrix.language == 'java' }}
        uses: gradle/actions/setup-gradle@v4

      - name: Install Node.js dependencies
        if: ${{ matrix.language == 'javascript' }}
        run: npm ci

      - name: Build TypeScript sources
        if: ${{ matrix.language == 'javascript' }}
        run: npm run build

      - name: Prepare Firebase placeholder configs for Android build
        if: ${{ matrix.language == 'java' }}
        run: |
          cat > masterApp/google-services.json <<'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "placeholder-ci",
              "storage_bucket": "placeholder-ci.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:placeholdermaster",
                  "android_client_info": {
                    "package_name": "com.minimaster.masterapp"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "placeholder"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF
          cat > childApp/google-services.json <<'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "placeholder-ci",
              "storage_bucket": "placeholder-ci.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:placeholderchild",
                  "android_client_info": {
                    "package_name": "com.google.pairing"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "placeholder"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: Build Android sources for CodeQL
        if: ${{ matrix.language == 'java' }}
        run: ./scripts/run-android-checks.sh :masterApp:assembleDebug :childApp:assembleDebug

      # Perform the analysis on the generated database
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
