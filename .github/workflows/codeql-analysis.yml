name: CodeQL Security Analysis

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '**/*.ts'
      - '**/*.js'
      - '**/*.kt'
      - '**/*.java'
      - '.github/workflows/codeql-analysis.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '**/*.ts'
      - '**/*.js'
      - '**/*.kt'
      - '**/*.java'
  schedule:
    # Weekly scan on Monday at 2 AM UTC
    - cron: '0 2 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze Code (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 360

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript
            build-mode: none
          - language: java
            build-mode: manual

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      # Initializes the CodeQL tools for scanning
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # `./codeql-custom-queries-actions` is an `actions`-language pack
          # (depends on `codeql/actions-all`, imports `import actions`) and
          # cannot be resolved against JavaScript or Java databases — applying
          # it caused both Analyze Code jobs to fail. Add a separate
          # `language: actions` matrix entry if Actions-CodeQL scanning is
          # desired; for JS/Java we run the standard suite only.
          queries: security-and-quality

      - name: Set up Java 17
        if: ${{ matrix.language == 'java' }}
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js 22
        if: ${{ matrix.language == 'javascript' }}
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Check network access to Google Maven
        if: ${{ matrix.language == 'java' }}
        id: network-check
        run: |
          if curl -sSf --max-time 15 https://dl.google.com >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "✅ Google Maven repository is accessible"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Google Maven repository (dl.google.com) is not accessible. Skipping Android build for CodeQL."
          fi

      - name: Set up Android SDK
        if: ${{ matrix.language == 'java' && steps.network-check.outputs.available == 'true' }}
        uses: android-actions/setup-android@v4

      - name: Set up Gradle
        if: ${{ matrix.language == 'java' && steps.network-check.outputs.available == 'true' }}
        uses: gradle/actions/setup-gradle@v6

      - name: Install Node.js dependencies
        if: ${{ matrix.language == 'javascript' }}
        run: npm ci

      - name: Build TypeScript sources
        if: ${{ matrix.language == 'javascript' }}
        run: npm run build

      - name: Prepare Firebase placeholder configs for Android build
        if: ${{ matrix.language == 'java' }}
        run: |
          cat > masterApp/google-services.json <<'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "placeholder-ci",
              "storage_bucket": "placeholder-ci.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:placeholdermaster",
                  "android_client_info": {
                    "package_name": "com.minimaster.masterapp"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "placeholder"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF
          cat > childApp/google-services.json <<'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "placeholder-ci",
              "storage_bucket": "placeholder-ci.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:placeholderchild",
                  "android_client_info": {
                    "package_name": "com.minimaster.childapp"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "placeholder"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF

      # Android build failures should not mask CodeQL findings in this job.
      # Keep this non-blocking because CodeQL can still analyze Java/Kotlin
      # sources from partial build output.
      - name: Build Android sources for CodeQL
        if: ${{ matrix.language == 'java' && steps.network-check.outputs.available == 'true' }}
        continue-on-error: true
        run: ./scripts/run-android-checks.sh :masterApp:assembleDebug :childApp:assembleDebug

      # Detect whether GitHub code scanning is available for this repository.
      # CodeQL requires GitHub Advanced Security on private repos; when it is
      # unavailable the SARIF upload cannot succeed, so the analysis is treated
      # as non-blocking (accepted risk with compensating controls). This makes
      # the gate self-adjusting: it re-enforces automatically once code scanning
      # becomes available (GHAS licensed or repo made public).
      - name: Check code scanning availability
        id: cs-check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/code-scanning/alerts?per_page=1")
          if [ "$code" = "403" ] || [ "$code" = "404" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Code scanning unavailable (private repo without GitHub Advanced Security). CodeQL analysis is non-blocking; compensating controls apply (eslint-plugin-security, npm audit, Firestore/Storage rules tests, secret-leak guard)."
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      # Perform the analysis on the generated database.
      #
      # Policy:
      # - push/schedule/workflow_dispatch on main: hard fail (release gate)
      #   WHEN code scanning is available.
      # - pull_request: soft-fail fallback to keep developer feedback flowing.
      # - code scanning unavailable (private repo without GHAS): soft-fail
      #   (accepted risk); auto-enforces again once code scanning is available.
      #
      # For the Java matrix we additionally skip when the Android build was
      # skipped (no `dl.google.com`): there is no extracted source for
      # CodeQL to analyse and it would fail with a useless "no source code
      # seen" error.
      - name: Perform CodeQL Analysis
        if: ${{ matrix.language != 'java' || steps.network-check.outputs.available == 'true' }}
        id: codeql-analyze
        continue-on-error: ${{ github.event_name == 'pull_request' || steps.cs-check.outputs.available != 'true' }}
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

      - name: Upload SARIF artifact (fallback when Code Scanning is disabled)
        if: always() && steps.codeql-analyze.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif-${{ matrix.language }}
          path: |
            ${{ runner.temp }}/codeql_databases
            **/*.sarif
          if-no-files-found: ignore
          retention-days: 30
