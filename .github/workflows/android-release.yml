name: Android Release Bundles

on:
  workflow_dispatch:
    inputs:
      play_ready:
        description: "Fail unless real Firebase configs and upload-key signing secrets are present"
        required: true
        default: false
        type: boolean
  pull_request:
    paths:
      - '**/*.kt'
      - '**/build.gradle'
      - 'settings.gradle'
      - 'gradle/**'
      - '.github/workflows/android-release.yml'

permissions:
  contents: read

jobs:
  release-bundles:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      MASTER_GOOGLE_SERVICES_JSON: ${{ secrets.MASTER_GOOGLE_SERVICES_JSON }}
      CHILD_GOOGLE_SERVICES_JSON: ${{ secrets.CHILD_GOOGLE_SERVICES_JSON }}
      MINIMASTER_RELEASE_KEYSTORE_BASE64: ${{ secrets.MINIMASTER_RELEASE_KEYSTORE_BASE64 }}
      MINIMASTER_RELEASE_STORE_FILE: ${{ runner.temp }}/minimaster-upload.jks
      MINIMASTER_RELEASE_STORE_PASSWORD: ${{ secrets.MINIMASTER_RELEASE_STORE_PASSWORD }}
      MINIMASTER_RELEASE_KEY_ALIAS: ${{ secrets.MINIMASTER_RELEASE_KEY_ALIAS }}
      MINIMASTER_RELEASE_KEY_PASSWORD: ${{ secrets.MINIMASTER_RELEASE_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v6

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android platform
        run: sdkmanager "platforms;android-36" "build-tools;36.1.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Prepare Firebase configs
        run: |
          set -euo pipefail

          write_placeholder() {
            local path="$1"
            local package_name="$2"
            local app_id_suffix="$3"
            cat > "$path" <<EOF
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "placeholder-ci",
              "storage_bucket": "placeholder-ci.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:${app_id_suffix}",
                  "android_client_info": {
                    "package_name": "${package_name}"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "placeholder"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF
          }

          if [ -n "${MASTER_GOOGLE_SERVICES_JSON}" ]; then
            printf '%s' "${MASTER_GOOGLE_SERVICES_JSON}" > masterApp/google-services.json
          else
            write_placeholder masterApp/google-services.json com.minimaster.masterapp placeholdermaster
          fi

          if [ -n "${CHILD_GOOGLE_SERVICES_JSON}" ]; then
            printf '%s' "${CHILD_GOOGLE_SERVICES_JSON}" > childApp/google-services.json
          else
            write_placeholder childApp/google-services.json com.minimaster.childapp placeholderchild
          fi

      - name: Decode upload key
        if: env.MINIMASTER_RELEASE_KEYSTORE_BASE64 != ''
        run: printf '%s' "${MINIMASTER_RELEASE_KEYSTORE_BASE64}" | base64 --decode > "${MINIMASTER_RELEASE_STORE_FILE}"

      - name: Enforce Play-ready secrets
        if: inputs.play_ready
        run: |
          set -euo pipefail
          test -n "${MASTER_GOOGLE_SERVICES_JSON}"
          test -n "${CHILD_GOOGLE_SERVICES_JSON}"
          test -n "${MINIMASTER_RELEASE_KEYSTORE_BASE64}"
          test -n "${MINIMASTER_RELEASE_STORE_PASSWORD}"
          test -n "${MINIMASTER_RELEASE_KEY_ALIAS}"
          test -n "${MINIMASTER_RELEASE_KEY_PASSWORD}"

      - name: Build release AABs
        run: ./scripts/run-android-checks.sh :masterApp:lintVitalRelease :childApp:lintVitalRelease :masterApp:bundleRelease :childApp:bundleRelease

      - name: Upload release bundles
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aabs
          path: |
            masterApp/build/outputs/bundle/release/*.aab
            childApp/build/outputs/bundle/release/*.aab
          retention-days: 30
