name: iOS CI

on:
  push:
    paths:
      - 'iosMasterApp/**'
      - 'iosChildApp/**'
      - '.github/workflows/ios-ci.yml'
  pull_request:
    paths:
      - 'iosMasterApp/**'
      - 'iosChildApp/**'
      - '.github/workflows/ios-ci.yml'

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-structure-validate:
    name: Validate iOS package structure
    runs-on: macos-14
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Validate package manifests
        run: |
          echo "=== MiniMasterParent ===" && \
          swift package --package-path iosMasterApp describe && \
          echo "=== MiniMasterChild ===" && \
          swift package --package-path iosChildApp describe

      - name: Validate required iOS files
        run: |
          test -f iosMasterApp/GoogleService-Info.template.plist
          test -f iosChildApp/GoogleService-Info.template.plist
          test -f iosMasterApp/MiniMasterParent.entitlements
          test -f iosChildApp/MiniMasterChild.entitlements
          test -f iosMasterApp/Tests/MiniMasterParentTests/MiniMasterParentTests.swift
          test -f iosChildApp/Tests/MiniMasterChildTests/MiniMasterChildTests.swift

      - name: Verify Firebase API keys are redacted in templates
        run: |
          grep -q 'PLACEHOLDER_API_KEY' iosMasterApp/GoogleService-Info.template.plist
          grep -q 'PLACEHOLDER_API_KEY' iosChildApp/GoogleService-Info.template.plist

      - name: CI scope note
        run: |
          echo 'This workflow validates package manifests and repository structure before running package-level builds/tests.'

  ios-build-and-test:
    name: Build and Test iOS Swift Packages
    runs-on: macos-14
    needs: ios-structure-validate
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Build MiniMasterParent package
        run: |
          swift build --package-path iosMasterApp

      - name: Test MiniMasterParent package
        run: |
          swift test --package-path iosMasterApp

      - name: Build MiniMasterChild package
        run: |
          swift build --package-path iosChildApp

      - name: Test MiniMasterChild package
        run: |
          swift test --package-path iosChildApp

      - name: Upload SwiftPM build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-swiftpm-artifacts
          path: |
            iosMasterApp/.build/**
            iosChildApp/.build/**
