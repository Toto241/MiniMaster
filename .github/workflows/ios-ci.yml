name: iOS CI

on:
  push:
    paths:
      - 'iosMasterApp/**'
      - 'iosChildApp/**'
      - '.github/workflows/ios-ci.yml'
  pull_request:
    paths:
      - 'iosMasterApp/**'
      - 'iosChildApp/**'
      - '.github/workflows/ios-ci.yml'

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-structure-validate:
    name: Validate iOS package structure
    runs-on: macos-14
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Validate package manifests
        run: |
          echo "=== MiniMasterParent ===" && \
          swift package --package-path iosMasterApp describe && \
          echo "=== MiniMasterChild ===" && \
          swift package --package-path iosChildApp describe

      - name: Validate required iOS files
        run: |
          test -f iosMasterApp/GoogleService-Info.template.plist
          test -f iosChildApp/GoogleService-Info.template.plist
          test -f iosMasterApp/MiniMasterParent.entitlements
          test -f iosChildApp/MiniMasterChild.entitlements
          test -f iosMasterApp/Tests/MiniMasterParentTests/MiniMasterParentTests.swift
          test -f iosChildApp/Tests/MiniMasterChildTests/MiniMasterChildTests.swift

      - name: Verify Firebase API keys are redacted in templates
        run: |
          grep -q 'PLACEHOLDER_API_KEY' iosMasterApp/GoogleService-Info.template.plist
          grep -q 'PLACEHOLDER_API_KEY' iosChildApp/GoogleService-Info.template.plist

      - name: CI scope note
        run: |
          echo 'This workflow validates package manifests and repository structure.'
          echo 'A full iOS app build requires committed Xcode project/workspace metadata and Firebase package wiring.'

  ios-build-and-test:
    name: Build and Test iOS Apps
    runs-on: macos-14
    timeout-minutes: 30
    # Requires: Xcode project committed + provisioning/signing secrets configured
    # To enable: Commit Xcode project metadata and add following GitHub secrets:
    #   - APPLE_SIGNING_CERTIFICATE (base64 .p12 certificate)
    #   - APPLE_SIGNING_CERTIFICATE_PASSWORD (certificate password)
    #   - APPLE_PROVISIONING_PROFILE_MASTER (base64 provisioning profile)
    #   - APPLE_PROVISIONING_PROFILE_CHILD (base64 provisioning profile)
    if: false # Change to true when Xcode project + provisioning profiles are ready

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Install provisioning profiles
        env:
          MASTER_PROFILE_B64: ${{ secrets.APPLE_PROVISIONING_PROFILE_MASTER }}
          CHILD_PROFILE_B64: ${{ secrets.APPLE_PROVISIONING_PROFILE_CHILD }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$MASTER_PROFILE_B64" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/master.mobileprovision
          echo "$CHILD_PROFILE_B64" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/child.mobileprovision

      - name: Import signing certificate
        env:
          CERTIFICATE_B64: ${{ secrets.APPLE_SIGNING_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERTIFICATE_B64" | base64 -d > /tmp/apple_cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security import /tmp/apple_cert.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          rm /tmp/apple_cert.p12

      - name: Build MiniMasterParent
        run: |
          xcodebuild build \
            -scheme MiniMasterParent \
            -configuration Release \
            -derivedDataPath ./.derived

      - name: Build MiniMasterChild
        run: |
          xcodebuild build \
            -scheme MiniMasterChild \
            -configuration Release \
            -derivedDataPath ./.derived

      - name: Run MiniMasterParent tests
        run: |
          xcodebuild test \
            -scheme MiniMasterParent \
            -configuration Release \
            -derivedDataPath ./.derived \
            -enableCodeCoverage YES

      - name: Run MiniMasterChild tests
        run: |
          xcodebuild test \
            -scheme MiniMasterChild \
            -configuration Release \
            -derivedDataPath ./.derived \
            -enableCodeCoverage YES

      - name: Upload coverage reports
        if: always()
        uses: codecov/codecov-action@v4
        with:
          flags: ios
          fail_ci_if_error: false
