name: iOS CI

on:
  push:
    paths:
      - 'iosMasterApp/**'
      - 'iosChildApp/**'
      - '.github/workflows/ios-ci.yml'
  pull_request:
    paths:
      - 'iosMasterApp/**'
      - 'iosChildApp/**'
      - '.github/workflows/ios-ci.yml'

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Parent App ────────────────────────────────────────────────────────────
  ios-master-app:
    name: Build & Test – MiniMasterParent
    runs-on: macos-14           # Apple Silicon, Xcode 15+
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Prepare Firebase config (parent)
        run: |
          sed "s/PLACEHOLDER_API_KEY/${{ secrets.FIREBASE_IOS_API_KEY }}/" \
            iosMasterApp/GoogleService-Info.template.plist \
            > iosMasterApp/GoogleService-Info.plist

      - name: Resolve SwiftPM dependencies (parent)
        working-directory: iosMasterApp
        run: swift package resolve

      - name: Build (parent – simulator)
        working-directory: iosMasterApp
        run: |
          xcodebuild build \
            -scheme MiniMasterParent \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color || cat build/DerivedData/Logs/Build/*.xcactivitylog 2>/dev/null | head -200

      - name: Unit tests (parent)
        working-directory: iosMasterApp
        run: |
          xcodebuild test \
            -scheme MiniMasterParent \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -resultBundlePath build/TestResults/parent.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color || true

      - name: Upload test results (parent)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-parent-test-results
          path: iosMasterApp/build/TestResults/

  # ─── Child App ─────────────────────────────────────────────────────────────
  ios-child-app:
    name: Build & Test – MiniMasterChild
    runs-on: macos-14
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Prepare Firebase config (child)
        run: |
          sed "s/PLACEHOLDER_API_KEY/${{ secrets.FIREBASE_IOS_API_KEY }}/" \
            iosChildApp/GoogleService-Info.template.plist \
            > iosChildApp/GoogleService-Info.plist

      - name: Resolve SwiftPM dependencies (child)
        working-directory: iosChildApp
        run: swift package resolve

      - name: Build (child – simulator)
        working-directory: iosChildApp
        run: |
          xcodebuild build \
            -scheme MiniMasterChild \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color || cat build/DerivedData/Logs/Build/*.xcactivitylog 2>/dev/null | head -200

      - name: Unit tests (child)
        working-directory: iosChildApp
        run: |
          xcodebuild test \
            -scheme MiniMasterChild \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -resultBundlePath build/TestResults/child.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color || true

      - name: Upload test results (child)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-child-test-results
          path: iosChildApp/build/TestResults/

  # ─── SwiftPM Lint (läuft auch auf Windows/Linux für reine Logic-Checks) ────
  swiftpm-lint:
    name: SwiftPM package validate
    runs-on: macos-14
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate package manifests
        run: |
          echo "=== MiniMasterParent ===" && \
          swift package --package-path iosMasterApp describe && \
          echo "=== MiniMasterChild ===" && \
          swift package --package-path iosChildApp describe
