name: Release Evidence Export

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - fix/**
  pull_request:

permissions:
  contents: read
  actions: read

jobs:
  export-release-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm install

      - name: Generate release evidence package
        run: npm run evidence:release

      - name: List generated artifacts
        run: |
          echo "Generated release evidence files:"
          find build/release-evidence -maxdepth 3 -type f | sort

      - name: Upload release evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence
          path: build/release-evidence
          if-no-files-found: error
          retention-days: 14
