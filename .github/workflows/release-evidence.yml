name: Release Evidence Export

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - fix/**
  pull_request:

permissions:
  contents: read

jobs:
  export-release-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run release evidence pipeline
        shell: bash
        run: |
          set -euxo pipefail
          python --version
          pwd
          ls -la
          test -f scripts/build_android_release_matrix_plan.py
          test -f scripts/run_android_release_matrix.py
          test -f scripts/validate_android_release_matrix_evidence.py
          test -f scripts/export_release_evidence.py
          python scripts/build_android_release_matrix_plan.py
          python scripts/run_android_release_matrix.py --profile smoke
          python scripts/validate_android_release_matrix_evidence.py --allow-dry-run
          python scripts/export_release_evidence.py

      - name: Upload Android matrix evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-release-matrix-evidence
          path: build/qa-artifacts/android-release-matrix
          if-no-files-found: warn
          retention-days: 14

      - name: Upload release evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence
          path: build/release-evidence
          if-no-files-found: warn
          retention-days: 14
