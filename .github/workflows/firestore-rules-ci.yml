name: Firestore Rules CI

on:
  push:
    paths:
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'firebase.json'
      - 'test/firestore-rules*.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'jest.config.*'
      - '.github/workflows/firestore-rules-ci.yml'
  pull_request:
    paths:
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'firebase.json'
      - 'test/firestore-rules*.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'jest.config.*'
      - '.github/workflows/firestore-rules-ci.yml'

permissions:
  contents: read

jobs:
  firestore-rules:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Structural rules validation
        run: npm run test:rules:structural

      - name: Emulator rules validation
        run: npm run test:rules:emulator
