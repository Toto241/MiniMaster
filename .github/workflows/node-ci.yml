name: Node CI
on:
  push:
    paths: ['**/*.ts', 'package.json', 'jest.config.*', 'tsconfig.json']
  pull_request:
    paths: ['**/*.ts', 'package.json', 'jest.config.*', 'tsconfig.json']

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run test:ci
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: node-coverage
          path: coverage
