name: Node CI
on:
  push:
    paths:
      - '**/*.ts'
      - '**/*.html'
      - 'admin-panel/**'
      - 'web-control/**'
      - 'parent-panel/**'
      - 'child-panel/**'
      - 'package.json'
      - 'jest.config.*'
      - 'tsconfig.json'
      - '.github/workflows/node-ci.yml'
  pull_request:
    paths:
      - '**/*.ts'
      - '**/*.html'
      - 'admin-panel/**'
      - 'web-control/**'
      - 'parent-panel/**'
      - 'child-panel/**'
      - 'package.json'
      - 'jest.config.*'
      - 'tsconfig.json'
      - '.github/workflows/node-ci.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run test:ci
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: node-coverage
          path: coverage
