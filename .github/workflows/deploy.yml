name: 'Deploy to Production'

on:
  push:
    branches: [ main ]
    paths:
      - 'index.ts'
      - 'firebase.ts'
      - 'firestore.rules'
      - 'storage.rules'
      - 'package.json'
      - 'package-lock.json'
  workflow_call:
    secrets:
      FIREBASE_SERVICE_ACCOUNT_KEY:
        required: true
      GEMINI_API_KEY:
        required: false
      GEMINI_MODEL:
        required: false
      OPENAI_API_KEY:
        required: false
      OPENAI_FALLBACK_ENABLED:
        required: false
      LEGAL_POLICY_BASE_URL:
        required: false
      PAIRING_LINK_BASE_URL:
        required: false
      DISABLE_LEGACY_SECRETKEY_AUTH:
        required: false
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deployment target'
        required: true
        default: 'all'
        type: choice
        options:
        - all
        - functions
        - firestore
        - storage
        - hosting

env:
  NODE_VERSION: '22'
  # Must match .firebaserc default project
  FIREBASE_PROJECT_ID: 'minimaster-28fbd'

jobs:
  deploy-backend:
    name: 'Deploy Firebase Backend'
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: 'Checkout code'
      uses: actions/checkout@v4

    - name: 'Setup Node.js'
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: 'Install dependencies'
      run: npm ci

    - name: 'Run linting'
      run: npm run lint

    - name: 'Run tests'
      run: npm test

    - name: 'Verify Play reviewer package is complete'
      run: |
        if grep -n 'TODO' docs/APP_ACCESS_REVIEWER_GUIDE.md; then
          echo '::error::docs/APP_ACCESS_REVIEWER_GUIDE.md still contains TODO markers. Complete the Play reviewer package before production deploy.'
          exit 1
        fi

    - name: 'Authenticate to Firebase'
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets[format('{0}', 'FIREBASE_SERVICE_ACCOUNT_KEY')] }}

    - name: 'Install Firebase CLI'
      run: npm install -g firebase-tools

    - name: 'Write Functions .env from GitHub Secrets'
      run: |
        # Firebase CLI picks up .env in project root and uploads env vars with functions.
        # Use empty string fallback so the step never fails on missing optional secrets.
        {
          echo "GEMINI_API_KEY=${GEMINI_API_KEY:-}"
          echo "GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}"
          echo "OPENAI_API_KEY=${OPENAI_API_KEY:-}"
          echo "OPENAI_FALLBACK_ENABLED=${OPENAI_FALLBACK_ENABLED:-false}"
          echo "LEGAL_POLICY_BASE_URL=${LEGAL_POLICY_BASE_URL:-https://minimaster.app/legal}"
          echo "PAIRING_LINK_BASE_URL=${PAIRING_LINK_BASE_URL:-https://minimaster.app/pair}"
          echo "DISABLE_LEGACY_SECRETKEY_AUTH=${DISABLE_LEGACY_SECRETKEY_AUTH:-true}"
        } > .env
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        OPENAI_FALLBACK_ENABLED: ${{ secrets.OPENAI_FALLBACK_ENABLED }}
        LEGAL_POLICY_BASE_URL: ${{ secrets.LEGAL_POLICY_BASE_URL }}
        PAIRING_LINK_BASE_URL: ${{ secrets.PAIRING_LINK_BASE_URL }}
        DISABLE_LEGACY_SECRETKEY_AUTH: ${{ secrets.DISABLE_LEGACY_SECRETKEY_AUTH }}

    - name: 'Deploy Firebase Functions'
      if: ${{ github.event.inputs.deploy_target == 'functions' || github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == '' }}
      run: firebase deploy --only functions --project ${{ env.FIREBASE_PROJECT_ID }}

    - name: 'Deploy Firestore Rules'
      if: ${{ github.event.inputs.deploy_target == 'firestore' || github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == '' }}
      run: firebase deploy --only firestore:rules --project ${{ env.FIREBASE_PROJECT_ID }}

    - name: 'Deploy Storage Rules'
      if: ${{ github.event.inputs.deploy_target == 'storage' || github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == '' }}
      run: firebase deploy --only storage --project ${{ env.FIREBASE_PROJECT_ID }}

    - name: 'Deploy All'
      if: ${{ github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == '' }}
      run: firebase deploy --project ${{ env.FIREBASE_PROJECT_ID }}

  build-android-apps:
    name: 'Build Android Applications'
    runs-on: ubuntu-latest
    defaults:
      run:
        # Set working directory to repository root where Gradle files are located
        working-directory: .
    strategy:
      matrix:
        app: [masterApp, childApp]

    steps:
    - name: 'Checkout code'
      uses: actions/checkout@v4

    - name: 'Validate Gradle Wrapper'
      uses: gradle/actions/wrapper-validation@v3

    - name: 'Setup JDK 17'
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 'Setup Android SDK'
      uses: android-actions/setup-android@v3

    - name: 'Cache Gradle packages'
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: 'Make gradlew executable'
      run: chmod +x ./gradlew

    - name: 'Show Gradle version'
      run: ./gradlew --version

    - name: 'Prepare Firebase placeholder configs'
      run: |
        cat > masterApp/google-services.json <<'EOF'
        {
          "project_info": {
            "project_number": "000000000000",
            "project_id": "placeholder-ci",
            "storage_bucket": "placeholder-ci.appspot.com"
          },
          "client": [
            {
              "client_info": {
                "mobilesdk_app_id": "1:000000000000:android:placeholdermaster",
                "android_client_info": {
                  "package_name": "com.minimaster.masterapp"
                }
              },
              "oauth_client": [],
              "api_key": [
                {
                  "current_key": "placeholder"
                }
              ],
              "services": {
                "appinvite_service": {
                  "other_platform_oauth_client": []
                }
              }
            }
          ],
          "configuration_version": "1"
        }
        EOF
        cat > childApp/google-services.json <<'EOF'
        {
          "project_info": {
            "project_number": "000000000000",
            "project_id": "placeholder-ci",
            "storage_bucket": "placeholder-ci.appspot.com"
          },
          "client": [
            {
              "client_info": {
                "mobilesdk_app_id": "1:000000000000:android:placeholderchild",
                "android_client_info": {
                  "package_name": "com.google.pairing"
                }
              },
              "oauth_client": [],
              "api_key": [
                {
                  "current_key": "placeholder"
                }
              ],
              "services": {
                "appinvite_service": {
                  "other_platform_oauth_client": []
                }
              }
            }
          ],
          "configuration_version": "1"
        }
        EOF

    - name: 'Build ${{ matrix.app }} Debug APK'
      run: ./gradlew :${{ matrix.app }}:assembleDebug

    - name: 'Run ${{ matrix.app }} Unit Tests'
      run: ./gradlew :${{ matrix.app }}:testDebugUnitTest

    - name: 'Upload ${{ matrix.app }} APK artifact'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.app }}-debug-apk
        path: ${{ matrix.app }}/build/outputs/apk/debug/*.apk
        retention-days: 30

  notify-deployment:
    name: 'Notify Deployment Status'
    runs-on: ubuntu-latest
    needs: [deploy-backend, build-android-apps]
    if: always()

    steps:
    - name: 'Deployment Success Notification'
      if: ${{ needs.deploy-backend.result == 'success' && needs.build-android-apps.result == 'success' }}
      run: |
        echo "✅ Deployment completed successfully!"
        echo "- Firebase backend deployed"
        echo "- Android apps built successfully"

    - name: 'Deployment Failure Notification'
      if: ${{ needs.deploy-backend.result == 'failure' || needs.build-android-apps.result == 'failure' }}
      run: |
        echo "❌ Deployment failed!"
        echo "- Backend status: ${{ needs.deploy-backend.result }}"
        echo "- Android build status: ${{ needs.build-android-apps.result }}"
        exit 1
