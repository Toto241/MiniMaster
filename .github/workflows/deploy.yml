name: 'Deploy to Production'

on:
  push:
    branches: [ main ]
    paths:
      - 'index.ts'
      - 'firebase.ts'
      - 'firestore.rules'
      - 'storage.rules'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deployment target'
        required: true
        default: 'all'
        type: choice
        options:
        - all
        - functions
        - firestore
        - storage
        - hosting

env:
  NODE_VERSION: '20'

jobs:
  deploy-backend:
    name: 'Deploy Firebase Backend'
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: 'Checkout code'
      uses: actions/checkout@v4

    - name: 'Setup Node.js'
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: 'Install dependencies'
      run: npm ci

    - name: 'Run linting'
      run: npm run lint

    - name: 'Run tests'
      run: npm test

    - name: 'Authenticate to Firebase'
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}

    - name: 'Install Firebase CLI'
      run: npm install -g firebase-tools

    - name: 'Deploy Firebase Functions'
      if: ${{ github.event.inputs.deploy_target == 'functions' || github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == '' }}
      run: firebase deploy --only functions --project ${{ secrets.FIREBASE_PROJECT_ID }}

    - name: 'Deploy Firestore Rules'
      if: ${{ github.event.inputs.deploy_target == 'firestore' || github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == '' }}
      run: firebase deploy --only firestore:rules --project ${{ secrets.FIREBASE_PROJECT_ID }}

    - name: 'Deploy Storage Rules'
      if: ${{ github.event.inputs.deploy_target == 'storage' || github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == '' }}
      run: firebase deploy --only storage --project ${{ secrets.FIREBASE_PROJECT_ID }}

    - name: 'Deploy All'
      if: ${{ github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == '' }}
      run: firebase deploy --project ${{ secrets.FIREBASE_PROJECT_ID }}

  build-android-apps:
    name: 'Build Android Applications'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [masterApp, childApp]
        
    steps:
    - name: 'Checkout code'
      uses: actions/checkout@v4

    - name: 'Setup JDK 17'
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 'Setup Android SDK'
      uses: android-actions/setup-android@v3

    - name: 'Cache Gradle packages'
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: 'Make gradlew executable'
      run: chmod +x ./gradlew

    - name: 'Build ${{ matrix.app }} Debug APK'
      run: ./gradlew :${{ matrix.app }}:assembleDebug

    - name: 'Run ${{ matrix.app }} Unit Tests'
      run: ./gradlew :${{ matrix.app }}:testDebugUnitTest

    - name: 'Upload ${{ matrix.app }} APK artifact'
      uses: actions/upload-artifact@v3
      with:
        name: ${{ matrix.app }}-debug-apk
        path: ${{ matrix.app }}/build/outputs/apk/debug/*.apk
        retention-days: 30

  notify-deployment:
    name: 'Notify Deployment Status'
    runs-on: ubuntu-latest
    needs: [deploy-backend, build-android-apps]
    if: always()
    
    steps:
    - name: 'Deployment Success Notification'
      if: ${{ needs.deploy-backend.result == 'success' && needs.build-android-apps.result == 'success' }}
      run: |
        echo "✅ Deployment completed successfully!"
        echo "- Firebase backend deployed"
        echo "- Android apps built successfully"
        
    - name: 'Deployment Failure Notification'
      if: ${{ needs.deploy-backend.result == 'failure' || needs.build-android-apps.result == 'failure' }}
      run: |
        echo "❌ Deployment failed!"
        echo "- Backend status: ${{ needs.deploy-backend.result }}"
        echo "- Android build status: ${{ needs.build-android-apps.result }}"
        exit 1