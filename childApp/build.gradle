plugins {
    id 'com.android.application'
    id 'kotlin-android'
}

android {
    compileSdkVersion 33
    namespace "com.google.pairing.child" // Added namespace

    defaultConfig {
        applicationId "com.google.pairing.child"
        minSdkVersion 21
        targetSdkVersion 33
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    kotlinOptions {
        jvmTarget = '1.8'
    }
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib:1.8.20" // Updated Kotlin version
    implementation 'androidx.core:core-ktx:1.10.1' // Updated core-ktx
    implementation 'androidx.appcompat:appcompat:1.6.1' // Keep for now, review later
    implementation 'com.google.android.material:material:1.9.0' // Keep for now, review later
    implementation "androidx.datastore:datastore-preferences:1.0.0"
    implementation "androidx.lifecycle:lifecycle-viewmodel-ktx:2.6.2" // Updated ViewModel dependency
    implementation "androidx.lifecycle:lifecycle-livedata-ktx:2.6.2" // Updated LiveData dependency
    implementation 'com.google.firebase:firebase-firestore-ktx:24.8.0' // Updated Firestore dependency
    implementation 'androidx.activity:activity-compose:1.7.2' // Updated Activity Compose dependency
    implementation "androidx.compose.ui:ui:1.5.4" // Updated Compose UI
    implementation "androidx.compose.material:material:1.5.4" // Updated Compose Material
    implementation "androidx.compose.ui:ui-tooling-preview:1.5.4" // Updated Compose UI Tooling Preview
    debugImplementation "androidx.compose.ui:ui-tooling:1.5.4" // Added Compose UI Tooling for debug
    testImplementation 'junit:junit:4.13.2'
    testImplementation 'org.mockito:mockito-core:5.3.1' // Updated Mockito
    testImplementation 'org.mockito.kotlin:mockito-kotlin:5.1.0' // Updated Mockito-Kotlin
    testImplementation 'androidx.arch.core:core-testing:2.2.0' // Updated Arch Core Testing
    testImplementation 'org.jetbrains.kotlinx:kotlinx-coroutines-test:1.7.1' // Updated Coroutines Test
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
    androidTestImplementation "androidx.compose.ui:ui-test-junit4:1.5.4" // Compose Testing
    debugImplementation "androidx.compose.ui:ui-test-manifest:1.5.4" // Compose Testing
    androidTestImplementation "org.mockito:mockito-android:5.3.1" // Mockito for Android tests
}

android {
    buildFeatures {
        compose true
    }
    composeOptions {
        kotlinCompilerExtensionVersion "1.4.6" // Updated for Kotlin 1.8.20 and Compose 1.5.x compatibility
    }
    // Ensure namespace is defined in the android block if not already. It's in the original.
}
