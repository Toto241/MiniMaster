openapi: 3.0.3
info:
  title: Mini-Master Cloud Functions API
  description: API documentation for Mini-Master Firebase Cloud Functions
  version: 1.1.0
  contact:
    name: Mini-Master Team
  license:
    name: ISC

servers:
  - url: https://us-central1-{projectId}.cloudfunctions.net
    description: Firebase Cloud Functions endpoint
    variables:
      projectId:
        default: minimaster-dev
        description: Firebase project ID

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Firebase Authentication ID token. Must be passed in the Authorization header as `Bearer <token>`."

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: Firebase Functions error code
              enum:
                - "invalid-argument"
                - "not-found"
                - "deadline-exceeded"
                - "resource-exhausted"
                - "permission-denied"
                - "unauthenticated"
                - "internal"
            message:
              type: string
              description: Human-readable error message
            details:
              type: object
              description: Additional error details

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          description: Indicates if the operation was successful.
          example: true

  responses:
    Unauthenticated:
      description: Authentication failed. The request did not include a valid Firebase Auth ID token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: "unauthenticated"
              message: "User must be authenticated."
    PermissionDenied:
      description: The authenticated user does not have permission to perform this action.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: "permission-denied"
              message: "Admin privileges required."
    RateLimited:
      description: The user has sent too many requests in a given amount of time.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: "resource-exhausted"
              message: "Too many requests. Please try again later."
    Success:
      description: The operation was successful.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessResponse'

paths:
  # ==================== Pairing ====================
  /createPairingCode:
    post:
      summary: Create a new pairing code
      description: Generates a unique 6-digit pairing code for device pairing, valid for 24 hours.
      operationId: createPairingCode
      tags: [Pairing]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Pairing code created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  pairingCode:
                    type: string
                    example: "123456"
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '429':
          $ref: '#/components/responses/RateLimited'

  /validatePairingToken:
    post:
      summary: Validate a pairing token and create device pairing
      description: Validates a pairing code and creates a permanent pairing between master and child devices.
      operationId: validatePairingToken
      tags: [Pairing]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pairingToken]
              properties:
                pairingToken:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Pairing validated and created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  childId:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          description: Token not found or invalid.

  # ==================== Task Management ====================
  /createTask:
    post:
      summary: Create a new task for a child
      operationId: createTask
      tags: [Task Management]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [childId, description]
              properties:
                childId: { type: string }
                description: { type: string }
                deadlineISO: { type: string, format: date-time }
      responses:
        '200':
          description: Task created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  taskId: { type: string }
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/PermissionDenied'

  /approveTask:
    post:
      summary: Approve a completed task
      operationId: approveTask
      tags: [Task Management]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [childId, taskId]
              properties:
                childId: { type: string }
                taskId: { type: string }
      responses:
        '200': { $ref: '#/components/responses/Success' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/PermissionDenied' }
        '404': { description: "Task or child not found." }
        '412': { description: "Task not in pending_approval state." }

  /rejectTask:
    post:
      summary: Reject a completed task
      description: Rejects a task and optionally provides a reason.
      operationId: rejectTask
      tags: [Task Management]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [childId, taskId]
              properties:
                childId: { type: string }
                taskId: { type: string }
                reason: { type: string, description: "Optional reason for rejection." }
      responses:
        '200': { $ref: '#/components/responses/Success' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/PermissionDenied' }
        '404': { description: "Task or child not found." }
        '412': { description: "Task not in pending_approval state." }

  # ==================== Device Control ====================
  /setDeviceLocked:
    post:
      summary: Lock or unlock a child device
      operationId: setDeviceLocked
      tags: [Device Control]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [childId, isLocked]
              properties:
                childId: { type: string }
                isLocked: { type: boolean }
      responses:
        '200': { $ref: '#/components/responses/Success' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/PermissionDenied' }

  # ==================== User Data & Compliance ====================
  /exportUserData:
    post:
      summary: Export all user data (DSAR)
      description: Exports all data associated with the authenticated user account for GDPR/DSAR compliance.
      operationId: exportUserData
      tags: [User Management]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User data exported successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data: { type: object, description: "A JSON object containing all user data." }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /deleteUserAccount:
    post:
      summary: Delete user account and all data
      operationId: deleteUserAccount
      tags: [User Management]
      security:
        - BearerAuth: []
      responses:
        '200': { $ref: '#/components/responses/Success' }
        '401': { $ref: '#/components/responses/Unauthenticated' }

  # ==================== Security & Admin ====================
  /setAdminClaim:
    post:
      summary: Set admin role for a user (Admin only)
      operationId: setAdminClaim
      tags: [Admin]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [uid]
              properties:
                uid: { type: string, description: "The UID of the user to grant admin role." }
      responses:
        '200': { $ref: '#/components/responses/Success' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/PermissionDenied' }

tags:
  - name: Pairing
    description: Device pairing and token management.
  - name: Task Management
    description: Creating and managing tasks for children.
  - name: Device Control
    description: Locking, unlocking, and managing child devices.
  - name: User Management
    description: User account lifecycle and data management.
  - name: Admin
    description: Administrative functions.
