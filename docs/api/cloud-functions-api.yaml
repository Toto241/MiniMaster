openapi: 3.0.3
info:
  title: Mini-Master Cloud Functions API
  description: API documentation for Mini-Master Firebase Cloud Functions
  version: 1.0.0
  contact:
    name: Mini-Master Team
  license:
    name: ISC

servers:
  - url: https://us-central1-{project-id}.cloudfunctions.net
    description: Firebase Cloud Functions endpoint
    variables:
      project-id:
        default: minimaster-dev
        description: Firebase project ID

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    PairingCodeRequest:
      type: object
      required:
        - childId
      properties:
        childId:
          type: string
          description: Unique identifier for the child device
          example: "child-device-123"
          minLength: 1
          maxLength: 100

    PairingCodeResponse:
      type: object
      properties:
        pairingCode:
          type: string
          description: Six-digit pairing code valid for 24 hours
          example: "123456"
          pattern: "^[0-9]{6}$"

    ValidatePairingRequest:
      type: object
      required:
        - pairingCode
        - childImei
      properties:
        pairingCode:
          type: string
          description: Six-digit pairing code to validate
          example: "123456"
          pattern: "^[0-9]{6}$"
        childImei:
          type: string
          description: IMEI of the child device
          example: "123456789012345"
          minLength: 15
          maxLength: 17

    ValidatePairingResponse:
      type: object
      properties:
        success:
          type: boolean
          description: Whether pairing was successful
          example: true
        childId:
          type: string
          description: The childId that was paired
          example: "child-device-123"

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: Firebase Functions error code
              enum:
                - "invalid-argument"
                - "not-found"
                - "deadline-exceeded"
                - "resource-exhausted"
                - "internal"
            message:
              type: string
              description: Human-readable error message
            details:
              type: object
              description: Additional error details

paths:
  /createPairingCode:
    post:
      summary: Create a new pairing code
      description: |
        Generates a unique 6-digit pairing code for device pairing.
        The code is valid for 24 hours and can be used once.
      operationId: createPairingCode
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PairingCodeRequest'
            examples:
              basic:
                summary: Basic pairing code request
                value:
                  childId: "child-device-123"
      responses:
        '200':
          description: Pairing code created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PairingCodeResponse'
              examples:
                success:
                  summary: Successful response
                  value:
                    pairingCode: "123456"
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid_child_id:
                  summary: Missing or invalid childId
                  value:
                    error:
                      code: "invalid-argument"
                      message: "The function must be called with a valid 'childId' string."
        '429':
          description: Too many pairing code generation attempts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                resource_exhausted:
                  summary: Max attempts exceeded
                  value:
                    error:
                      code: "resource-exhausted"
                      message: "Failed to generate a unique pairing code after maximum attempts."
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /validatePairingToken:
    post:
      summary: Validate a pairing code and create device pairing
      description: |
        Validates a pairing code and creates a permanent pairing between
        master and child devices. The pairing code is consumed upon successful validation.
      operationId: validatePairingToken
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidatePairingRequest'
            examples:
              basic:
                summary: Basic validation request
                value:
                  pairingCode: "123456"
                  childImei: "123456789012345"
      responses:
        '200':
          description: Pairing validated and created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidatePairingResponse'
              examples:
                success:
                  summary: Successful pairing
                  value:
                    success: true
                    childId: "child-device-123"
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Pairing code not found or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                not_found:
                  summary: Invalid pairing code
                  value:
                    error:
                      code: "not-found"
                      message: "Invalid or expired pairing code."
        '408':
          description: Pairing code expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                expired:
                  summary: Expired pairing code
                  value:
                    error:
                      code: "deadline-exceeded"
                      message: "Pairing code has expired."

tags:
  - name: Pairing
    description: Device pairing operations
  - name: Authentication
    description: Authentication and authorization